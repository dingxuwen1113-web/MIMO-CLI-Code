# =============================================================================
# MIMO CLI Code - Docker Compose (Production)
# =============================================================================
# Services:
#   mimo       - Main MIMO agent (chat + API gateway) on port 9120
#   dashboard  - Web dashboard (optional, can be disabled) on port 9119
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # Main MIMO Agent Service
  # ---------------------------------------------------------------------------
  mimo:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # Set to "true" to include Playwright browser support
        INSTALL_PLAYWRIGHT: "false"
    container_name: mimo-agent
    restart: unless-stopped

    # API / gateway port
    ports:
      - "${MIMO_API_PORT:-9120}:9120"

    environment:
      # Required: Anthropic API key for Claude models
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:?ANTHROPIC_API_KEY is required}
      # Optional: override default model
      - MIMO_MODEL=${MIMO_MODEL:-}
      # Optional: OpenAI-compatible key for alternative providers
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      # API / dashboard configuration
      - MIMO_API_HOST=0.0.0.0
      - MIMO_API_PORT=9120
      - MIMO_DASHBOARD_PORT=9119
      # Logging
      - MIMO_LOG_LEVEL=${MIMO_LOG_LEVEL:-info}
      # Node.js runtime tuning
      - NODE_OPTIONS=${NODE_OPTIONS:---max-old-space-size=2048}
      # Timezone (defaults to UTC)
      - TZ=${TZ:-UTC}

    volumes:
      # MIMO home directory: config, sessions, memory, credentials
      - mimo_home:/home/mimo/.mimo
      # Workspace: the code directory MIMO operates on
      - ${MIMO_WORKSPACE:-./workspace}:/workspace
      # Optional: mount local config files (uncomment if needed)
      # - ./config:/app/config:ro
      # Optional: mount agents directory (uncomment if needed)
      # - ./agents:/app/agents:ro

    networks:
      - mimo-net

    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:9120/health"]
      interval: 30s
      timeout: 10s
      start_period: 20s
      retries: 3

    deploy:
      resources:
        limits:
          memory: 4G
          cpus: "2.0"
        reservations:
          memory: 512M
          cpus: "0.5"

    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"

  # ---------------------------------------------------------------------------
  # Web Dashboard Service (optional)
  # ---------------------------------------------------------------------------
  dashboard:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        INSTALL_PLAYWRIGHT: "true"
    container_name: mimo-dashboard
    restart: unless-stopped

    # Dashboard UI port
    ports:
      - "${MIMO_DASHBOARD_PORT:-9119}:9119"

    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - MIMO_API_HOST=0.0.0.0
      - MIMO_API_PORT=9120
      - MIMO_DASHBOARD_PORT=9119
      - MIMO_LOG_LEVEL=${MIMO_LOG_LEVEL:-info}
      - MIMO_MODE=dashboard
      - TZ=${TZ:-UTC}

    # Dashboard talks to mimo service over the internal network
    depends_on:
      mimo:
        condition: service_healthy

    volumes:
      - mimo_home:/home/mimo/.mimo
      - ${MIMO_WORKSPACE:-./workspace}:/workspace

    networks:
      - mimo-net

    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:9119/"]
      interval: 30s
      timeout: 10s
      start_period: 20s
      retries: 3

    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "1.0"
        reservations:
          memory: 256M
          cpus: "0.25"

    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"

    # Set to true in .env or override to enable
    profiles:
      - dashboard

# =============================================================================
# Named volumes
# =============================================================================
volumes:
  mimo_home:
    name: mimo_home

# =============================================================================
# Networks
# =============================================================================
networks:
  mimo-net:
    driver: bridge
    name: mimo-network
