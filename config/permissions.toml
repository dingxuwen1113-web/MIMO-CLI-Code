# ════════════════════════════════════════════════════════════════════════════════
# MIMO CLI Code v2.0 - External Permission Configuration
# ════════════════════════════════════════════════════════════════════════════════
#
# This file defines the permission matrix for all built-in tools across
# the four operational modes. Editing this file customizes tool access
# without modifying source code.
#
# Modes (least to most permissive):
#   plan   - Read-only. No mutations allowed.
#   agent  - Write operations require user approval.
#   custom - Configurable middle ground between agent and yolo.
#   yolo   - Fully autonomous. All operations execute without approval.
#
# Permission values:
#   auto   - Execute automatically without asking the user.
#   ask    - Prompt the user for approval before executing.
#   denied - Block execution entirely.
#
# Tool categories: file, shell, search, browser, web, git, task, notebook,
#                  image, computer, review, safety, lsp, rlm, audit
# ════════════════════════════════════════════════════════════════════════════════


# ──────────────────────────────────────────────────────────────────────────────
# Tool Permission Matrix
# ──────────────────────────────────────────────────────────────────────────────
#
# Each [[tool_permissions]] entry sets the permission for one tool in one mode.
# Unlisted tool/mode combinations fall back to the hardcoded defaults in mode.ts.
#
# Format:
#   [[tool_permissions]]
#   name  = "tool_name"     # Tool identifier (e.g. "file_write")
#   mode  = "agent"         # One of: plan, agent, custom, yolo
#   value = "auto"          # One of: auto, ask, denied

