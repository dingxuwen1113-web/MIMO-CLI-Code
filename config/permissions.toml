# ──────────────────────────────────────────────────────────────────────────────
# Directory-Based Permission Rules
# ──────────────────────────────────────────────────────────────────────────────
#
# These rules override the base permission matrix when a tool's input contains
# a file path matching the specified glob pattern. Rules are evaluated in order;
# the first matching rule wins.
#
# Format:
#   [[directory_rules]]
#   tool      = "file_write"        # Tool name (supports * wildcards)
#   pattern   = "src/**"            # Glob pattern to match file paths
#   mode      = "agent"             # Mode this rule applies to
#   permission = "auto"             # Override permission (auto|ask|denied)

# Source code: writes auto-approved in agent and custom modes
[[directory_rules]]
tool      = "file_write"
pattern   = "src/**"
mode      = "agent"
permission = "auto"

[[directory_rules]]
tool      = "file_write"
pattern   = "src/**"
mode      = "custom"
permission = "auto"

[[directory_rules]]
tool      = "file_edit"
pattern   = "src/**"
mode      = "agent"
permission = "auto"

[[directory_rules]]
tool      = "file_edit"
pattern   = "src/**"
mode      = "custom"
permission = "auto"

# Test files: always auto-approve writes
[[directory_rules]]
tool      = "file_write"
pattern   = "tests/**"
mode      = "agent"
permission = "auto"

[[directory_rules]]
tool      = "file_edit"
pattern   = "tests/**"
mode      = "agent"
permission = "auto"

# Config files: require approval in all modes except yolo
[[directory_rules]]
tool      = "*"
pattern   = "config/**"
mode      = "agent"
permission = "ask"

[[directory_rules]]
tool      = "*"
pattern   = "config/**"
mode      = "custom"
permission = "ask"

# Root-level config files (package.json, tsconfig.json, etc.): require approval
[[directory_rules]]
tool      = "file_write"
pattern   = "package.json"
mode      = "agent"
permission = "ask"

[[directory_rules]]
tool      = "file_write"
pattern   = "package.json"
mode      = "custom"
permission = "ask"

[[directory_rules]]
tool      = "file_write"
pattern   = "tsconfig.json"
mode      = "agent"
permission = "ask"

[[directory_rules]]
tool      = "file_write"
pattern   = "tsconfig.json"
mode      = "custom"
permission = "ask"

# Dangerous paths: always denied in plan mode regardless of tool
[[directory_rules]]
tool      = "*"
pattern   = ".env*"
mode      = "plan"
permission = "denied"

[[directory_rules]]
tool      = "*"
pattern   = ".env*"
mode      = "agent"
permission = "denied"

[[directory_rules]]
tool      = "*"
pattern   = ".env*"
mode      = "custom"
permission = "denied"

# node_modules: block all writes
[[directory_rules]]
tool      = "file_write"
pattern   = "node_modules/**"
mode      = "yolo"
permission = "denied"


# ──────────────────────────────────────────────────────────────────────────────
# Input-Aware Overrides
# ──────────────────────────────────────────────────────────────────────────────
#
# Some tools have sub-operations with different risk levels. These overrides
# refine permissions based on specific input parameters.
#
# Format:
#   [[input_overrides]]
#   tool       = "git_branch"           # Tool name
#   field      = "action"               # Input field to check
#   match      = ["create", "delete"]   # Values that trigger the override
#   mode       = "agent"                # Mode this override applies to
#   permission = "ask"                  # Override permission

# git_branch: create/delete/switch = write, list/current = read
[[input_overrides]]
tool       = "git_branch"
field      = "action"
match      = ["create", "delete", "switch"]
mode       = "agent"
permission = "ask"

[[input_overrides]]
tool       = "git_branch"
field      = "action"
match      = ["create", "delete", "switch"]
mode       = "custom"
permission = "ask"

# git_checkout: file restore = write, branch switch = read
[[input_overrides]]
tool       = "git_checkout"
field      = "file"
match      = ["__any__"]
mode       = "agent"
permission = "ask"

[[input_overrides]]
tool       = "git_checkout"
field      = "file"
match      = ["__any__"]
mode       = "custom"
permission = "ask"

# git_stash: push/pop/drop = write, list/show = read
[[input_overrides]]
tool       = "git_stash"
field      = "action"
match      = ["push", "pop", "drop"]
mode       = "agent"
permission = "ask"

[[input_overrides]]
tool       = "git_stash"
field      = "action"
match      = ["push", "pop", "drop"]
mode       = "custom"
permission = "ask"


# ──────────────────────────────────────────────────────────────────────────────
# MCP Tool Permissions
# ──────────────────────────────────────────────────────────────────────────────
#
# External MCP tools (mcp__<server>__<tool>) are classified by name pattern.
# These rules override the default read/write classification.
#
# Format:
#   [[mcp_permissions]]
#   pattern    = "mcp__*__read_*"    # Glob on full tool name
#   mode       = "agent"             # Mode this rule applies to
#   permission = "auto"              # Permission to grant

# Read-like MCP tools: auto-approve in all modes
[[mcp_permissions]]
pattern    = "mcp__*__read*"
mode       = "agent"
permission = "auto"

[[mcp_permissions]]
pattern    = "mcp__*__get*"
mode       = "agent"
permission = "auto"

[[mcp_permissions]]
pattern    = "mcp__*__list*"
mode       = "agent"
permission = "auto"

[[mcp_permissions]]
pattern    = "mcp__*__search*"
mode       = "agent"
permission = "auto"

[[mcp_permissions]]
pattern    = "mcp__*__find*"
mode       = "agent"
permission = "auto"

[[mcp_permissions]]
pattern    = "mcp__*__query*"
mode       = "agent"
permission = "auto"

# Write-like MCP tools: require approval in agent mode
[[mcp_permissions]]
pattern    = "mcp__*__create*"
mode       = "agent"
permission = "ask"

[[mcp_permissions]]
pattern    = "mcp__*__update*"
mode       = "agent"
permission = "ask"

[[mcp_permissions]]
pattern    = "mcp__*__delete*"
mode       = "agent"
permission = "ask"

[[mcp_permissions]]
pattern    = "mcp__*__write*"
mode       = "agent"
permission = "ask"

[[mcp_permissions]]
pattern    = "mcp__*__execute*"
mode       = "agent"
permission = "ask"

# Dangerous MCP operations: always require approval (even in custom)
[[mcp_permissions]]
pattern    = "mcp__*__delete*"
mode       = "custom"
permission = "ask"

[[mcp_permissions]]
pattern    = "mcp__*__execute*"
mode       = "custom"
permission = "ask"

[[mcp_permissions]]
pattern    = "mcp__*__drop*"
mode       = "custom"
permission = "ask"
